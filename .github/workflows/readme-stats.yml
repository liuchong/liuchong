name: Update GitHub Personal Stats

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check personal stats token
        env:
          PERSONAL_STATS_TOKEN: ${{ secrets.PERSONAL_STATS_TOKEN }}
        run: test -n "$PERSONAL_STATS_TOKEN"

      - name: Generate dashboard
        uses: liuchong/github-personal-stats@v1.0.2
        with:
          card: dashboard
          version: v1.0.2
          path: profile/github-personal-stats.svg
          options: --user ${{ github.repository_owner }} --width 1000 --height 420 --authored-languages --author-email mail@liuchong.io,mail@liuchong.dev,mail@liuchong.cn,mail@liuchong.com,mail@liuchong.org,mail@liuchong.net,bjlclc@gmail.com,liuchong@xd.com,liuchong@xindong.com --hide-language Ruby --min-repo-language-share 2
          token: ${{ secrets.PERSONAL_STATS_TOKEN }}

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/github-personal-stats.svg
          git commit -m "Update GitHub personal stats" || exit 0
          git push
